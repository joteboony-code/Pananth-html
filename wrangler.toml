# Cloudflare Worker deploy config: Pananth rental backend only
# ใช้ไฟล์นี้สำหรับ Deploy Worker หลังบ้านเท่านั้น ไม่รวม index.html / PWA frontend

name = "white-rice-cf72"
main = "worker.js"
compatibility_date = "2026-05-10"
workers_dev = true

# Cron แจ้งเตือนค้างชำระอัตโนมัติ
# เวลา Cloudflare ใช้ UTC: 02:00 UTC = 09:00 ไทย
[triggers]
crons = ["0 2 5,10,15,20,25 * *"]

# ===== KV Binding =====
# สำคัญ: ต้องใส่ id ของ KV namespace ตัวเดิมที่ใช้งานจริง
# Binding name ต้องเป็น DB เพราะ worker.js เรียก env.DB
[[kv_namespaces]]
binding = "DB"
id = "PUT_YOUR_EXISTING_KV_NAMESPACE_ID_HERE"

# ===== R2 Binding =====
# สำคัญ: ต้องใส่ bucket_name ของ R2 bucket ตัวเดิมที่ใช้ backup
# Binding name ต้องเป็น RENTAL_R2 เพราะ worker.js เรียก env.RENTAL_R2
[[r2_buckets]]
binding = "RENTAL_R2"
bucket_name = "PUT_YOUR_EXISTING_R2_BUCKET_NAME_HERE"

# ===== Non-secret variables =====
# ตัวแปรที่ไม่ใช่ความลับ ใส่ใน repo ได้
[vars]
R2_AUTO_BACKUP_RETENTION_DAYS = "180"
# ADMIN_ORIGIN = "https://pananth.joteboony.workers.dev"
# ALLOWED_ORIGINS = "https://pananth.joteboony.workers.dev"

# ===== Secrets ที่ห้ามใส่ใน GitHub repo =====
# ตั้งไว้ที่ Cloudflare Worker Settings > Variables > Secrets ของ Worker หลังบ้านแทน:
# LINE_TOKEN
# LINE_CHANNEL_SECRET
# EASYSLIP_API_KEY
# OWNER_ID
# ADMIN_UNLOCK_KEY
